services:
  deepinsight-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deepinsight-api
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - server_gradapp_net

networks:
  server_gradapp_net:
    external: true
